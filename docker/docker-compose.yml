version: '3.8'

services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:8080}"
      SERVER_PORT: "${SERVER_PORT:-:8080}"
      DB_PATH: "/data/db/bot.db"
      DOWNLOAD_DIR: "/data/downloads"
      CACHE_DIR: "/data/cache"
      MAX_CONCURRENT: "${MAX_CONCURRENT:-3}"
    ports:
      - "8080:8080"
    volumes:
      - bot-data:/data

volumes:
  bot-data:
